<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action - PHIERS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            line-height: 1.8;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .global-nav {
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 30px;
            position: sticky;
            top: 10px;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .mobile-menu-toggle {
            display: none;
            background: transparent;
            border: 1px solid #4caf50;
            color: #4caf50;
            font-size: 1.8em;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin: 0;
            width: 100%;
            text-align: center;
            font-weight: bold;
        }

        .mobile-menu-toggle:hover {
            background: rgba(76, 175, 80, 0.2);
        }

        .nav-links-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: 100%;
        }

        .nav-item {
            color: #81c784;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-item:hover {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .nav-item.active {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
            font-weight: bold;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background: transparent;
            color: #81c784;
            padding: 8px 12px;
            font-size: 0.9em;
            font-weight: 500;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .dropbtn:hover {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(26, 26, 46, 0.98);
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.4);
            z-index: 1001;
            border-radius: 8px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            padding: 8px 0;
        }

        .dropdown-content a {
            color: #81c784;
            padding: 10px 16px;
            text-decoration: none;
            display: block;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .dropdown-content a:hover {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown:hover .dropbtn {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }
            .global-nav {
                padding: 10px;
            }
            .nav-links-container {
                display: none;
                flex-direction: column;
                width: 100%;
                margin-top: 15px;
            }
            .nav-links-container.active {
                display: flex;
            }
            .nav-item, .dropdown {
                width: 100%;
                text-align: center;
            }
            .dropdown-content {
                position: static;
                width: 100%;
                margin-top: 5px;
            }
            .dropbtn {
                width: 100%;
            }
        }

            text-align: center;
            padding: 50
